# Configuración base para servir el frontend estático SPA (React)
# y redireccionar de forma transparente la carpeta /api/ al backend Node PM2 local

server {
    listen 80;
    
    # IMPORTANTE: Reemplazar el server_name con el dominio público / IP interna.
    server_name example.com www.example.com localhost;

    # Opciones de compresión gzip activadas para velocidad (opcional)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 1) Bloque estático principal: La carpeta DIST compilada por Vite.
    # En Windows la ruta sería similar a: root "C:/Ruta/A/ERP-Repair/frontend/dist";
    # En Linux sería similar a: root /var/www/erp-repair/frontend/dist;
    root /ruta/absoluta/a/tu/ERP-Repair/frontend/dist;
    index index.html;

    # React Router DOM / SPA Fallback rule
    # Si Nginx no encuentra un archivo físico (ej, si buscas /sucursales directo)
    # servirá "index.html" y dejará que React tome control del url dinámicamente.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2) Bloque Reverse Proxy (Backend Node PM2)
    # Cualquier request HTTP al frontend que empiece por /api/
    # NGINX la interceptará en caliente y la empujará al puerto interno 3000 de Node.
    location /api/ {
        # Mantener los headers reales del cliente a Node
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
        proxy_set_header X-NginX-Proxy true;

        # El servidor express configurado
        proxy_pass http://127.0.0.1:3000;
        proxy_redirect off;

        # Opciones avanzadas de WebSocket y SSE si lo necesitas
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 3) Servir recursos estáticos (CSS, JS, iconos locales) con un header de cache inmenso
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }
}
